<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcan Labs</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"
      crossorigin="anonymous"
    ></script>

    <style>
      :root {
        --bg-gradient-start: #0f172a;
        --bg-gradient-end: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --border-color: #334155;
        --hover-bg: #334155;
        --bg-pos1: 20% 80%;
        --bg-pos2: 80% 20%;
        --bg-pos3: 40% 40%;
        --bg-opacity1: 0.15;
        --bg-opacity2: 0.15;
        --bg-opacity3: 0.08;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-gradient-start),
          var(--bg-gradient-end)
        );
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(
            circle at var(--bg-pos1),
            rgba(59, 130, 246, var(--bg-opacity1)) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at var(--bg-pos2),
            rgba(147, 51, 234, var(--bg-opacity2)) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at var(--bg-pos3),
            rgba(255, 255, 255, var(--bg-opacity3)) 0%,
            transparent 50%
          );
        pointer-events: none;
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px) rotate(0deg);
          --bg-pos1: 20% 80%;
          --bg-pos2: 80% 20%;
          --bg-pos3: 40% 40%;
          --bg-opacity1: 0.15;
          --bg-opacity2: 0.15;
          --bg-opacity3: 0.08;
        }
        25% {
          transform: translateY(-5px) rotate(0.5deg);
          --bg-pos1: 22% 78%;
          --bg-pos2: 78% 22%;
          --bg-pos3: 42% 38%;
          --bg-opacity1: 0.18;
          --bg-opacity2: 0.18;
          --bg-opacity3: 0.09;
        }
        50% {
          transform: translateY(-10px) rotate(1deg);
          --bg-pos1: 25% 75%;
          --bg-pos2: 75% 25%;
          --bg-pos3: 45% 35%;
          --bg-opacity1: 0.2;
          --bg-opacity2: 0.2;
          --bg-opacity3: 0.1;
        }
        75% {
          transform: translateY(-5px) rotate(0.5deg);
          --bg-pos1: 22% 78%;
          --bg-pos2: 78% 22%;
          --bg-pos3: 42% 38%;
          --bg-opacity1: 0.18;
          --bg-opacity2: 0.18;
          --bg-opacity3: 0.09;
        }
        100% {
          transform: translateY(0px) rotate(0deg);
          --bg-pos1: 20% 80%;
          --bg-pos2: 80% 20%;
          --bg-pos3: 40% 40%;
          --bg-opacity1: 0.15;
          --bg-opacity2: 0.15;
          --bg-opacity3: 0.08;
        }
      }

      .container {
        max-width: 600px;
        padding: 40px;
        position: relative;
        z-index: 1;
        animation:
          fadeIn 1s ease-in,
          gentleFloat 4s ease-in-out infinite 1s;
      }

      @keyframes gentleFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 3rem;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }

      p {
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .tagline {
        font-weight: 300;
        font-size: 1rem;
        margin-bottom: 40px;
        color: var(--text-muted);
      }

      .links {
        display: flex;
        gap: 25px;
        justify-content: center;
        margin-top: 20px;
      }

      .cta-button {
        display: inline-block;
        margin-top: 40px;
        padding: 12px 24px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: var(--text-primary);
        text-decoration: none;
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        position: relative;
        overflow: hidden;
      }

      .cta-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s;
      }

      .cta-button:hover::before {
        left: 100%;
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      }

      .icon-link {
        width: 50px;
        height: 50px;
        border: 1px solid var(--border-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        font-size: 1.2rem;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .icon-link:hover {
        background-color: var(--hover-bg);
        transform: translateY(-3px) scale(1.1);
        box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      }

      footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        font-size: 0.8rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Arcan Labs</h1>
      <div class="tagline">Engineering Intelligent Digital Systems</div>
      <p>
        We're building innovative solutions at the intersection of technology,
        automation, and scalable infrastructure.
        <br /><br />
        Our platform is launching soon.
      </p>

      <div class="links">
        <a href="mailto:hello@arcanlabs.io" class="icon-link">
          <i class="fas fa-envelope"></i>
        </a>

        <a
          href="https://www.linkedin.com/company/arcan-labs/"
          target="_blank"
          class="icon-link"
        >
          <i class="fab fa-linkedin-in"></i>
        </a>

        <a
          href="https://www.upwork.com/agencies/2031610530784457546/"
          target="_blank"
          class="icon-link"
        >
          <i class="fab fa-upwork"></i>
        </a>
      </div>

      <a href="mailto:arcanlabslk@gmail.com" class="cta-button">Get In Touch</a>
    </div>

    <footer>© 2026 Arcan Labs. All rights reserved.</footer>
  </body>
</html>
