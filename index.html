<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcan Labs</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"
      crossorigin="anonymous"
    ></script>

    <style>
      :root {
        --primary: #2a6b6b; /* dark teal */
        --accent: #3ca89a; /* teal accent */
        --white: #ffffff;
        --bg-dark: #181f23; /* almost black/charcoal */
        --text-main: #f5f7fa;
        --text-muted: #b6c2c9;
        --border-color: #3ca89a;
        --hover-bg: #3ca89a22;
        --bg-pos1: 20% 80%;
        --bg-pos2: 80% 20%;
        --bg-pos3: 40% 40%;
        --bg-opacity1: 0.1;
        --bg-opacity2: 0.1;
        --bg-opacity3: 0.06;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg-dark);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(
            circle at var(--bg-pos1),
            rgba(60, 168, 154, var(--bg-opacity1)) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at var(--bg-pos2),
            rgba(255, 255, 255, var(--bg-opacity2)) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at var(--bg-pos3),
            rgba(42, 107, 107, var(--bg-opacity3)) 0%,
            transparent 50%
          );
        pointer-events: none;
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px) rotate(0deg);
          --bg-pos1: 20% 80%;
          --bg-pos2: 80% 20%;
          --bg-pos3: 40% 40%;
          --bg-opacity1: 0.15;
          --bg-opacity2: 0.15;
          --bg-opacity3: 0.08;
        }
        16.67% {
          transform: translateY(-2px) rotate(0.2deg);
          --bg-pos1: 21% 79%;
          --bg-pos2: 79% 21%;
          --bg-pos3: 41% 39%;
          --bg-opacity1: 0.16;
          --bg-opacity2: 0.16;
          --bg-opacity3: 0.085;
        }
        33.33% {
          transform: translateY(-5px) rotate(0.5deg);
          --bg-pos1: 22% 78%;
          --bg-pos2: 78% 22%;
          --bg-pos3: 42% 38%;
          --bg-opacity1: 0.17;
          --bg-opacity2: 0.17;
          --bg-opacity3: 0.09;
        }
        50% {
          transform: translateY(-10px) rotate(1deg);
          --bg-pos1: 23% 77%;
          --bg-pos2: 77% 23%;
          --bg-pos3: 43% 37%;
          --bg-opacity1: 0.18;
          --bg-opacity2: 0.18;
          --bg-opacity3: 0.095;
        }
        66.67% {
          transform: translateY(-5px) rotate(0.5deg);
          --bg-pos1: 22% 78%;
          --bg-pos2: 78% 22%;
          --bg-pos3: 42% 38%;
          --bg-opacity1: 0.17;
          --bg-opacity2: 0.17;
          --bg-opacity3: 0.09;
        }
        83.33% {
          transform: translateY(-2px) rotate(0.2deg);
          --bg-pos1: 21% 79%;
          --bg-pos2: 79% 21%;
          --bg-pos3: 41% 39%;
          --bg-opacity1: 0.16;
          --bg-opacity2: 0.16;
          --bg-opacity3: 0.085;
        }
        100% {
          transform: translateY(0px) rotate(0deg);
          --bg-pos1: 20% 80%;
          --bg-pos2: 80% 20%;
          --bg-pos3: 40% 40%;
          --bg-opacity1: 0.15;
          --bg-opacity2: 0.15;
          --bg-opacity3: 0.08;
        }
      }

      .container {
        max-width: 600px;
        padding: 40px;
        position: relative;
        z-index: 1;
        background: rgba(24, 31, 35, 0.96);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        color: var(--text-main);
        animation:
          fadeIn 1s ease-in,
          gentleFloat 4s ease-in-out infinite 1s;
      }

      @keyframes gentleFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 3rem;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 1px;
        color: var(--white);
        text-shadow: 0 2px 12px #0004;
      }

      p {
        font-size: 1.1rem;
        color: var(--text-muted);
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .tagline {
        font-weight: 300;
        font-size: 1rem;
        margin-bottom: 40px;
        color: var(--accent);
        letter-spacing: 2px;
      }

      .links {
        display: flex;
        gap: 25px;
        justify-content: center;
        margin-top: 20px;
      }

      .cta-button {
        display: inline-block;
        margin-top: 40px;
        padding: 12px 24px;
        background: linear-gradient(135deg, var(--accent), var(--primary));
        color: var(--white);
        text-decoration: none;
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(60, 168, 154, 0.18);
        position: relative;
        overflow: hidden;
      }

      .cta-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(60, 168, 154, 0.18),
          transparent
        );
        transition: left 0.5s;
      }

      .cta-button:hover::before {
        left: 100%;
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(60, 168, 154, 0.35);
      }

      .icon-link {
        width: 50px;
        height: 50px;
        border: 1.5px solid var(--accent);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        background: var(--bg-dark);
        font-size: 1.2rem;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .icon-link:hover {
        background-color: var(--accent);
        color: var(--white);
        transform: translateY(-3px) scale(1.1);
        box-shadow: 0 4px 15px rgba(60, 168, 154, 0.18);
      }

      footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        font-size: 0.8rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Arcan Labs</h1>
      <div class="tagline">Engineering Intelligent Digital Systems</div>
      <p>
        We're building innovative solutions at the intersection of technology,
        automation, and scalable infrastructure.
        <br /><br />
        Our platform is launching soon.
      </p>

      <div class="links">
        <a href="mailto:hello@arcanlabs.io" class="icon-link">
          <i class="fas fa-envelope"></i>
        </a>

        <a
          href="https://www.linkedin.com/company/arcan-labs/"
          target="_blank"
          class="icon-link"
        >
          <i class="fab fa-linkedin-in"></i>
        </a>

        <a
          href="https://www.upwork.com/agencies/2031610530784457546/"
          target="_blank"
          class="icon-link"
        >
          <i class="fab fa-upwork"></i>
        </a>
      </div>

      <a href="mailto:arcanlabslk@gmail.com" class="cta-button">Get In Touch</a>
    </div>

    <footer>© 2026 Arcan Labs. All rights reserved.</footer>
  </body>
</html>
